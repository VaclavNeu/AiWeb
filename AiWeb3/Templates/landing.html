<!doctype html>
<html lang="cs">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-ai="pageTitle">Můj web</title>
    <link rel="icon" type="image/png" href="/favicon.png">


    <style>
        /* Barvy dosadíme přes :root (přepíšeme injekcí ve službě) */
        :root {
            --accent-600: #2563eb;
            --accent-400: #60a5fa;
            --bg: #ffffff;
            --text: #111827;
            --muted: #6b7280;
        }

        body {
            margin: 0;
            font-family: system-ui,Arial,sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6
        }

        .announce {
            background: var(--accent-400);
            color: #fff;
            padding: 8px 0;
            text-align: center
        }

        .site-header {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 14px 20px;
            background: #fff
        }

            .site-header .logo {
                max-height: 30px
            }

        .main-nav {
            margin-left: auto;
            display: flex;
            gap: 28px;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-left: 12px;
        }

        .btn {
            border-radius: 999px;
            padding: 10px 16px;
            border: 1px solid #e5e7eb
        }

            .btn.solid {
                background: var(--accent-600);
                color: #fff;
                border-color: transparent
            }

        .hero-head {
            padding: 60px 20px;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1.8fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            align-items: center
        }

            .hero-grid .card {
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(0,0,0,.06);
                overflow: hidden;
                background: #fff;
                display: grid;
                place-items: center
            }

            .hero-grid img {
                width: 100%;
                height: 280px;
                object-fit: cover;
                display: block
            }

        .benefits {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px
        }

        .benefit {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,.05)
        }

        .promo {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 24px;
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            align-items: center
        }

            .promo .checks {
                list-style: none;
                padding: 0;
                margin: 0
            }

                .promo .checks li {
                    margin: .35rem 0;
                    position: relative;
                    padding-left: 1.4rem
                }

                    .promo .checks li::before {
                        content: "✔";
                        position: absolute;
                        left: 0;
                        top: 0;
                        color: var(--accent-600)
                    }

            .promo .video iframe {
                width: 100%;
                height: 315px;
                border: 0
            }

        .cta-strip {
            background: white;
            padding: 14px 0;
            margin: 0px 0
        }

        .cta-wrap {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0px;
            align-items: center;
            padding: 0 20px
        }

        .site-footer {
            background: #0f172a; /* tmavé pozadí */
            color: #e5e7eb;
            margin-top: 0;
        }

        .footer-wrap {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto; /* centrování obsahu jako na tvém vzoru */
            padding: 48px 24px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(5,minmax(180px,1fr)); /* 5 sloupců */
            gap: 32px;
            align-items: start;
        }

        .fcol h4 {
            margin: 0 0 .75rem;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: .03em;
            color: #f1f5f9;
        }

        .fcol ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }

        .fcol li {
            color: #cbd5e1;
            line-height: 1.5;
            word-break: break-word; /* aby dlouhé položky nepřetékaly */
        }

        /* sociální ikony – malé a v řadě */
        .footer-socials {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

            .footer-socials img {
                width: 26px;
                height: 26px;
                border-radius: 50%;
                display: block;
            }

        /* subfooter přes celou šířku pod sloupci */
        .subfooter__note {
            grid-column: 1 / -1;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,.08);
            text-align: center;
            opacity: .8;
        }

        /* responzivita */
        @media (max-width:1024px) {
            .footer-wrap {
                grid-template-columns: repeat(3,minmax(160px,1fr));
            }
        }

        @media (max-width:640px) {
            .footer-wrap {
                grid-template-columns: 1fr;
            }

            .footer-socials {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="announce" data-ai="announceText">Vyzkoušejte naši službu na 14 dní zdarma. <span style="text-decoration:underline">Klikněte zde!</span></div>

    <header class="site-header">
        <img class="logo" src="/Loga/logo_3.png" alt="logo" />
        <nav class="main-nav"><span>Úvod</span><span>Funkce</span><span>Šablony</span><span>Klienti</span><span>Ceny</span><span>Blog</span><span>Kontakt</span></nav>
        <div class="actions"><button class="btn">Přihlášení</button><button class="btn solid">Koupit</button></div>
    </header>

    <main>
        <section class="hero-head">
            <h1 data-ai="title">Hlavní nadpis</h1>
            <p class="lead" data-ai="subtitle">Krátký podnadpis…</p>
            <button class="btn solid" data-ai="ctaText">Vyzkoušet zdarma</button>
        </section>

        <section class="hero-grid">
            <figure class="card left"><img data-ai-img="heroLeft" alt=""></figure>
            <figure class="card center">
                <img data-ai-img="heroMain" alt="">
                <figcaption style="padding:14px 16px;text-align:center">
                    <h3 data-ai="heroHeadline">ONLINE FITNESS KURZ</h3>
                    <p data-ai="heroLead">Cvičte odkudkoli a podle sebe.</p>
                </figcaption>
            </figure>
            <figure class="card right"><img data-ai-img="heroRight" alt=""></figure>
        </section>

        <section class="benefits">
            <div class="benefit"><h4 data-ai="benefit1Title">Benefit 1</h4><p data-ai="benefit1Text">Text…</p></div>
            <div class="benefit"><h4 data-ai="benefit2Title">Benefit 2</h4><p data-ai="benefit2Text">Text…</p></div>
            <div class="benefit"><h4 data-ai="benefit3Title">Benefit 3</h4><p data-ai="benefit3Text">Text…</p></div>
        </section>

        <section class="promo">
            <div class="promo-text">
                <h2 data-ai="promoTitle">Začněte ještě dnes</h2>
                <p class="lead" data-ai="promoLead">Získejte přístup k nástrojům…</p>
                <ul class="checks" data-ai-list="promoBenefits"></ul>
                <div class="promo-actions" style="display:flex;gap:10px;margin-top:10px">
                    <button class="btn solid" data-ai="promoPrimary">Vyzkoušet zdarma</button>
                    <button class="btn" data-ai="promoSecondary">Je tento web pro vás?</button>
                </div>
            </div>
            <div class="video">
                <!-- Klíč jen uložíme; tvoje služba pak nahradí na skutečné embed URL -->
                <iframe data-ai-youtube="promoVideo"></iframe>
            </div>
        </section>

        <section class="cta-strip">
            <div class="cta-wrap">
                <p class="cta-text" data-ai="stripText">Krátká výzva ke zkoušce…</p>
                <button class="btn solid" data-ai="stripBtn">Začít</button>
            </div>
        </section>
    </main>

    <footer class="site-footer" id="footer">
        <div class="footer-wrap">
            <div class="fcol" id="f-col1">
                <h4 id="f-col1-title"></h4>
                <ul id="f-col1-list"></ul>
            </div>

            <div class="fcol" id="f-col2">
                <h4 id="f-col2-title"></h4>
                <ul id="f-col2-list"></ul>
            </div>

            <div class="fcol" id="f-col3">
                <h4 id="f-col3-title"></h4>
                <ul id="f-col3-list"></ul>
            </div>

            <div class="fcol" id="f-col4">
                <h4 id="f-col4-title"></h4>
                <ul id="f-col4-list"></ul>
            </div>

            <div class="fcol" id="f-col5">
                <h4 id="f-col5-title"></h4>
                <ul id="f-col5-list"></ul>

                <!-- sociální ikony klidně nech v 5. sloupci -->
                <div id="footer-socials" class="footer-socials"></div>
            </div>

            <!-- řádek přes celou šířku pod sloupci -->
            <div id="subnote" class="subfooter__note"></div>
        </div>
    </footer>

</body>
</html>
